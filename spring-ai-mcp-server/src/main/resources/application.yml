# 服务器配置
server:
  # 配置服务器端口
  port: 8081

spring:
  application:
    name: spring-ai-mcp-server
  ai:
    mcp:
      server:
        name: spring-ai-mcp-server
        version: 1.0.0
        type: SYNC
        instructions: ""
        annotation-scanner:
          enabled: true
        # sse-endpoint: /sse
        # sse-message-endpoint: /mcp/message
        # base-url: ""
logging:
  level:
    org.springframework.ai: DEBUG
    com.ranyk.spring.ai.mcp: DEBUG
